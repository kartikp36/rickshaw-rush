<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rickshaw Rush 3D</title>
    <link rel="icon" type="image/png" href="public/rickshaw-rush-logo.png" sizes="512x512">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="start-screen" class="screen main-menu">
                <h1>Rickshaw Rush 3D</h1>
                <div class="menu-buttons">
                    <button id="play-btn" class="game-btn">Play</button>
                    <button id="instructions-btn" class="game-btn">How to Play</button>
                    </div>
            </div>

            <!-- Modals -->
            <div id="instructions-modal" class="screen modal hidden">
                <div class="modal-content">
                    <h2>How to Play</h2>
                    <ul>
                        <li>Swipe Left/Right or use A/D keys to steer.</li>
                        <li>Avoid cars, trucks, and obstacles!</li>
                        <li>Survive as long as possible to get a high score.</li>
                    </ul>
                    <button id="close-instructions-btn" class="game-btn secondary-btn">Back</button>
                </div>
            </div>
            <div id="hud" class="hidden">
                <div id="score-display">Score: 0</div>
            </div>
            <div id="near-miss-container"></div>
            <div id="game-over-screen" class="screen hidden">
                <h1>Game Over</h1>
                <p id="final-score">Score: 0</p>
                <p id="best-score">Best: 0</p>
                <p>Tap to Restart</p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
